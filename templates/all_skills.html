{% extends "base.html" %}

{% block title %}Skills Database{% endblock %}

{% block content %}

<style>
    .setup-box {
        border: 2px solid #000;
        padding: 20px;
        max-width: 400px;
        margin-bottom: 30px;
    }

    .field {
        margin-bottom: 15px;
    }

    label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
    }

    input, select {
        width: 100%;
        padding: 6px;
        font-size: 14px;
    }

    .section {
        margin-bottom: 40px;
    }

    .section-title {
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 10px;
        border-bottom: 2px solid #000;
        padding-bottom: 5px;
    }

    .button-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
    }

    .skill-button-wrapper {
        display: inline-block;
    }

    .skill-button {
        padding: 8px 12px;
        border: 1px solid #333;
        background: #f5f5f5;
        cursor: pointer;
        border-radius: 4px;
    }
</style>

<!-- CHARACTER SETUP -->
<form method="POST" action="{{ url_for('create_character') }}">
<div class="setup-box">

    <h2>Character Setup</h2>

    <div class="field">
        <label>Name</label>
        <input type="text" name="name" placeholder="Enter name">
    </div>

    <div class="field">
        <label>Culture</label>
        <select name="culture">
            <option value="celestine">Celestine</option>
        </select>
    </div>

    <div class="field">
        <label>Bloodline</label>
        <select name="bloodline">
            <option value="human">Human</option>
        </select>
    </div>

    <div class="field">
        <label>Faith</label>
        <select name="faith">
            <option value=""></option>
            <option value="celestine">Celestine</option>
        </select>
    </div>

    <button type="submit">Create Character</button>

</div>
</form>

<h1>Skill Database</h1>

<!-- SKILLS -->
{% for category_name, category_data in skills_db.items() %}

<div class="section">

    <div class="section-title">
        {{ category_name }}
    </div>

    <div class="button-grid">

        {% for skill_name in category_data.keys() %}

        <div class="skill-button-wrapper">

            <button
                type="button"
                class="skill-button"
                data-skill="{{ skill_name }}"
                data-state="add"
                onclick="toggleSkill(this)">

                <span class="label">{{ skill_name }}</span>
                <span class="action">+</span>

            </button>

        </div>

        {% endfor %}

    </div>

</div>

{% endfor %}

<!-- JS (single global handler) -->
<script>
function toggleSkill(btn) {

    const skill = btn.dataset.skill;
    const state = btn.dataset.state;

    const url = state === "add" ? "/add_skill" : "/remove_skill";

    fetch(url, {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: new URLSearchParams({
            skill: skill,
            quantity: 1,
            cost: 0
        })
    })
    .then(res => res.json())
    .then(data => {

        console.log("SERVER RESPONSE:", data);

        if (!data.success) {
            alert(data.error || "Action failed");
            return;
        }

        // toggle UI only if backend succeeds
        if (state === "add") {
            btn.dataset.state = "remove";
            btn.querySelector(".action").textContent = "-";
        } else {
            btn.dataset.state = "add";
            btn.querySelector(".action").textContent = "+";
        }

        // update points if returned
        if (data.points !== undefined) {
            const el = document.querySelector("#points-value");
            if (el) el.textContent = data.points;
        }
    })
    .catch(err => {
        console.error("REQUEST FAILED:", err);
        alert("Request failed (check console)");
    });
}
</script>

{% endblock %}
