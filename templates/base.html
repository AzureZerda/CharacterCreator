<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Page{% endblock %}</title>

    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .page-wrapper {
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }

        .content {
            flex: 1; /* pushes footer down */
            padding: 40px;
        }

        .footer {
            background: #00bcd4; /* softer aqua / cyan */
            color: white;
            text-align: center;
            padding: 10px 0;
        }
    </style>
</head>

<body>

<div class="page-wrapper">

    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <div class="footer">
        made by Azure | This is a prototype | <a href="https://github.com/AzureZerda/CharacterCreator" target="_blank" rel="noopener noreferrer">code</a>
    </div>

</div>

</body>
</html>
