<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ category|title }} Skills</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .top-bar {
            position: absolute;
            top: 10px;
            right: 10px;
            left: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .left-controls,
        .right-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .table {
            max-width: 600px;
            margin-top: 60px;
        }

        .row {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #ccc;
        }

        .header {
            font-weight: bold;
            border-bottom: 2px solid #000;
        }

        .skill { flex: 2; }
        .quantity, .cost { flex: 1; text-align: right; }
        .action { flex: 1; text-align: right; }

        button {
            padding: 4px 10px;
            cursor: pointer;
        }

        select {
            width: 70px;
        }
    </style>
</head>

<body>

<div class="top-bar">

    <!-- LEFT SIDE: BACK BUTTON -->
    <div class="left-controls">
        <a href="{{ url_for('home') }}">
            <button type="button">Back</button>
        </a>
    </div>

    <!-- RIGHT SIDE: POINTS + RESET -->
    <div class="right-controls">
        <div>
            Points: <span id="points-value">{{ points }}</span>
        </div>

        <form method="POST" action="{{ url_for('reset') }}">
            <button type="submit">Reset</button>
        </form>
    </div>

</div>

<h1>{{ category|title }} Skills</h1>

<div class="table">

    <div class="row header">
        <span class="skill">Skill</span>
        <span class="quantity">Quantity</span>
        <span class="cost">Cost</span>
        <span class="action">Action</span>
    </div>

    {% for name, data in skills.items() %}

    <form class="row">

        <input type="hidden" name="skill" value="{{ name }}">
        <input type="hidden" name="cost" value="{{ data['Cost'] }}">

        <span class="skill">{{ name }}</span>

        <span class="quantity">

            {% if data['Max'] == 1 %}
                <input type="hidden" name="quantity" value="1">
                1

            {% elif data['Max'] is not none %}
                <select name="quantity">
                    {% for i in range(1, data['Max'] + 1) %}
                        <option value="{{ i }}">{{ i }}</option>
                    {% endfor %}
                </select>

            {% else %}
                <select name="quantity">
                    {% for i in range(0, 11) %}
                        <option value="{{ i }}">{{ i }}</option>
                    {% endfor %}
                </select>
            {% endif %}

        </span>

        <span class="cost">{{ data['Cost'] }}</span>

        <span class="action">
            <button
                type="button"
                data-state="add"
                onclick="toggleSkill(this)">
                Add
            </button>
        </span>

    </form>

    {% endfor %}

</div>

<script>
function toggleSkill(btn) {

    const form = btn.closest("form");
    const formData = new FormData(form);

    const state = btn.dataset.state || "add";
    const url = state === "add" ? "/add_skill" : "/remove_skill";

    fetch(url, {
        method: "POST",
        body: new URLSearchParams(formData)
    })
    .then(res => res.json())
    .then(data => {

        if (!data.success) {
            alert(data.error || "Action failed");
            return;
        }

        if (data.points !== undefined) {
            document.getElementById("points-value").textContent = data.points;
        }

        if (state === "add") {
            btn.textContent = "Remove";
            btn.dataset.state = "remove";
        } else {
            btn.textContent = "Add";
            btn.dataset.state = "add";
        }

    })
    .catch(err => {
        console.error(err);
        alert("Request failed");
    });
}
</script>

</body>
</html>
