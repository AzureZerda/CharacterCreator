<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Character</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background: #f4f4f4;
        }

        .form-container {
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
            border: 2px solid #000;
            border-radius: 6px;
            background: #f9f9f9;
        }

        .form-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 2px solid #000;
            padding-bottom: 5px;
        }

        .field {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .required {
            color: red;
            margin-left: 4px;
        }

        .submit-btn {
            margin-top: 10px;
            padding: 8px 12px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>

<body>

<div class="form-container">

    <div class="form-title">Enter Details</div>

    <form method="POST" action="{{ url_for('process_person') }}">

        <div class="field">
            <label>Name <span class="required">*</span></label>
            <input type="text" name="name" required>
        </div>

        <div class="field">
            <label>Email <span class="required">*</span></label>
            <input type="email" name="email" required>
        </div>

        <div class="field">
            <label>Discord Username</label>
            <input type="text" name="discord">
        </div>

        <div class="field">
            <label>Character Name <span class="required">*</span></label>
            <input type="text" name="character_name" required>
        </div>

        <button type="submit" class="submit-btn">Submit</button>

    </form>

</div>

</body>
</html>
