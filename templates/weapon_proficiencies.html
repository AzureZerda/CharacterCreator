<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weapon Proficiencies</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .top-bar {
            position: absolute;
            top: 10px;
            right: 10px;
        }

        .table {
            max-width: 600px;
            margin-top: 40px;
        }

        .row {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #ccc;
        }

        .header {
            font-weight: bold;
            border-bottom: 2px solid #000;
        }

        .skill { flex: 2; }
        .quantity, .cost { flex: 1; text-align: right; }
        .action { flex: 1; text-align: right; }

        button {
            padding: 4px 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="top-bar">
    <form method="POST" action="{{ url_for('reset') }}">
        <button type="submit">Reset</button>
    </form>
</div>

<h1>Weapon Proficiencies</h1>

<div class="table">

    <div class="row header">
        <span class="skill">Skill</span>
        <span class="quantity">Quantity</span>
        <span class="cost">Cost</span>
        <span class="action">Action</span>
    </div>

    <!-- SHORT WEAPONS -->
    <div class="row">
        <span class="skill">Short Weapons</span>
        <span class="quantity">1</span>
        <span class="cost">1</span>
        <span class="action">
            <button data-skill="Short Weapons" data-state="add" onclick="toggleSkill(this)">Add</button>
        </span>
    </div>

    <!-- ONE-HANDED -->
    <div class="row">
        <span class="skill">One-Handed Weapons</span>
        <span class="quantity">1</span>
        <span class="cost">2</span>
        <span class="action">
            <button data-skill="One-Handed Weapons" data-state="add" onclick="toggleSkill(this)">Add</button>
        </span>
    </div>

    <!-- TWO-HANDED -->
    <div class="row">
        <span class="skill">Two-Handed Weapons</span>
        <span class="quantity">1</span>
        <span class="cost">3</span>
        <span class="action">
            <button data-skill="Two-Handed Weapons" data-state="add" onclick="toggleSkill(this)">Add</button>
        </span>
    </div>

    <!-- OVERSIZED -->
    <div class="row">
        <span class="skill">Oversized Weapon Use</span>
        <span class="quantity">1</span>
        <span class="cost">2</span>
        <span class="action">
            <button data-skill="Oversized Weapon Use" data-state="add" onclick="toggleSkill(this)">Add</button>
        </span>
    </div>

    <!-- THROWN -->
    <div class="row">
        <span class="skill">Thrown Weapons</span>
        <span class="quantity">1</span>
        <span class="cost">2</span>
        <span class="action">
            <button data-skill="Thrown Weapons" data-state="add" onclick="toggleSkill(this)">Add</button>
        </span>
    </div>

    <!-- BOW -->
    <div class="row">
        <span class="skill">Bow and Arrow</span>
        <span class="quantity">1</span>
        <span class="cost">3</span>
        <span class="action">
            <button data-skill="Bow and Arrow" data-state="add" onclick="toggleSkill(this)">Add</button>
        </span>
    </div>

    <!-- TWO-WEAPON -->
    <div class="row">
        <span class="skill">Two-Weapon Fighting</span>
        <span class="quantity">1</span>
        <span class="cost">6</span>
        <span class="action">
            <button data-skill="Two-Weapon Fighting" data-state="add" onclick="toggleSkill(this)">Add</button>
        </span>
    </div>

</div>

<script>
function toggleSkill(btn) {

    const skill = btn.dataset.skill;
    const state = btn.dataset.state;

    const url = state === "add" ? "/add_skill" : "/remove_skill";

    fetch(url, {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: new URLSearchParams({
            skill: skill,
            quantity: 1,
            cost: 1
        })
    })
    .then(res => res.json())
    .then(data => {

        if (!data.success) {
            alert(data.error || "Action failed");
            return;
        }

        // toggle UI state ONLY on success
        if (state === "add") {
            btn.textContent = "Remove";
            btn.dataset.state = "remove";
        } else {
            btn.textContent = "Add";
            btn.dataset.state = "add";
        }

    })
    .catch(err => {
        console.error(err);
        alert("Request failed");
    });
}
</script>

</body>
</html>
