{% extends "base.html" %}

{% block title %}Character Creation{% endblock %}

{% block content %}

<style>
    .page-container {
        display:flex;
        justify-content:center;
        gap:40px;
        flex-wrap:wrap;
    }

    .form-container {
        width:400px;
        padding:20px;
        border:2px solid #000;
        border-radius:6px;
        background:#f9f9f9;
    }

    .form-title {
        font-size:20px;
        font-weight:bold;
        margin-bottom:15px;
        border-bottom:2px solid #000;
        padding-bottom:5px;
    }

    .field {
        margin-bottom:15px;
    }

    label {
        display:block;
        font-weight:bold;
        margin-bottom:5px;
    }

    input, select {
        width:100%;
        padding:8px;
        font-size:14px;
        box-sizing:border-box;
    }

    .required {
        color:red;
        margin-left:4px;
    }

    button {
        padding:10px 15px;
        cursor:pointer;
        width:100%;
        margin-top:20px;
    }
</style>

<form id="combined-form">

<div class="page-container">

    <!-- PLAYER INFO -->
    <div class="form-container">

        <div class="form-title">Player Info</div>

        <div class="field">
            <label>Name <span class="required">*</span></label>
            <input type="text" name="player_name" required>
        </div>

        <div class="field">
            <label>Email <span class="required">*</span></label>
            <input type="email" name="email" required>
        </div>

        <div class="field">
            <label>Discord Username</label>
            <input type="text" name="discord">
        </div>

        <div class="field">
            <label>Character Name <span class="required">*</span></label>
            <input type="text" name="character_name" required>
        </div>

    </div>

    <!-- CHARACTER SETUP -->
    <div class="form-container">

        <div class="form-title">Character Setup</div>

        <div class="field">
            <label>Name</label>
            <input type="text" name="name" required>
        </div>

        <div class="field">
            <label>Culture</label>
            <select name="culture">
                <option value="Castle Thorn">Castle Thorn</option>
                <option value="The Celestine Empire">Celestine</option>
                <option value="Cestral">Cestral</option>
                <option value="Cole">Cole</option>
                <option value="Dace">Dace</option>
                <option value="The Kingdom of Hastings">Hastings</option>
                <option value="The Nadine Empire">Nadine</option>
                <option value="The Vein">Vein</option>
                <option value="The Drir">Drir</option>
                <option value="The Ko'aat">Ko'aat</option>
                <option value="Myre">Myre</option>
                <option value="The Saek">Saek</option>
                <option value="The Trahazi">Trahazi</option>
                <option value="The Vicaul">Vicaul</option>
                <option value="Paradox: Dawn">Paradox: Dawn</option>
                <option value="Paradox: Dusk">Paradox: Dusk</option>
                <option value="Bastion">Bastion</option>
                <option value="The Breach">The Breach</option>
                <option value="Redemption">Redemption</option>
                <option value="The Citadel">Citadel</option>
                <option value="Endurant Tribes">Endurant Tribes</option>
            </select>
        </div>

        <div class="field">
            <label>Bloodline</label>
            <select name="bloodline">
                <option value="human">Human</option>
                <option value="effendal">Effendal</option>
                <option value="fae-blooded">Fae-Blooded</option>
                <option value="celestial-blooded">Celestial-Blooded</option>
                <option value="demon-blooded">Demon-Blooded</option>
                <option value="dragon-blooded">Dragon-Blooded</option>
                <option value="newborn dream">Newborn Dream</option>
            </select>
        </div>

        <div class="field">
            <label>Faith</label>
            <select name="faith">
                <option value=""></option>
                <option value="celestine">Celestine</option>
                <option value="eden">Eden</option>
                <option value="Old Ways">The Old Ways</option>
                <option value="mists">The Lady of the Mists</option>
                <option value="celestine">Celestine</option>
                <option value="nameless">The Nameless Faith</option>
                <option value="blood_cauldron">The Blood Cauldron</option>
            </select>
        </div>

    </div>

</div>

<button type="submit">Submit All</button>

</form>

<script>
document.getElementById("combined-form").addEventListener("submit", function(e){
    e.preventDefault();

    const formData = new FormData(this);

    fetch("{{ url_for('submission_test') }}", {
        method: "POST",
        body: formData
    })
    .then(async res => {
        if(!res.ok){
            const text = await res.text();
            throw new Error(text || "Submission failed");
        }
        return res;
    })
    .then(() => {
        window.location.href = "/all_skills";
    })
    .catch(err => {
        console.error(err);
        showPopup("ERROR", err.message);
    });
});
</script>

{% endblock %}
