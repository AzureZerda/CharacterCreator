{% extends "base.html" %}

{% block title %}Backstory{% endblock %}

{% block content %}

<style>
    .container {
        max-width: 600px;
        margin: 40px auto;
    }

    textarea {
        width: 100%;
        height: 200px;
        padding: 10px;
        font-size: 14px;
        resize: vertical;
    }

    button {
        margin-top: 15px;
        padding: 10px;
        width: 100%;
        cursor: pointer;
    }
</style>

<div class="container">

    <h2>Enter Backstory</h2>

    <form method="POST" action="{{ url_for('submit_backstory') }}">

        <textarea name="backstory" placeholder="Write your backstory here..." required></textarea>

        <button type="submit">Submit Backstory</button>

    </form>

</div>

{% endblock %}
