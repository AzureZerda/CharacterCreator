{% extends "base.html" %}

{% block title %}Your Page Title{% endblock %}

{% block content %}

<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">
    <title>Display Dict</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
        }

        .top-bar {
            margin-bottom: 20px;
        }

        .table {
            max-width: 500px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #ccc;
        }

        .header {
            font-weight: bold;
            border-bottom: 2px solid #000;
        }

        button {
            padding: 6px 12px;
            cursor: pointer;
        }
    </style>




<div class="top-bar">
    <a href="{{ url_for('home') }}">
        <button type="button">Back</button>
    </a>
</div>

<h2>Display Dict</h2>

<div class="table">

    <div class="row header">
        <span>Key</span>
        <span>Value</span>
    </div>

    {% for key, value in display_dict.items() %}
        <div class="row">
            <span>{{ key }}</span>
            <span>{{ value }}</span>
        </div>
    {% endfor %}

</div>

{% endblock %}
